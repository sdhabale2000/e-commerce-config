spring.application.name=order-service
server.port=8083

# ===============================
# PostgreSQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/orderdb
spring.datasource.username=postgres
spring.datasource.password=root

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Eureka Client
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Optional - Prefer IP address in Eureka
eureka.instance.prefer-ip-address=true
spring.cloud.openfeign.okhttp.enabled=true
# ===============================
#circuit breaker
# Enable health details
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*

# Circuit Breaker
resilience4j.circuitbreaker.instances.productServiceBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.productServiceBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.productServiceBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productServiceBreaker.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.productServiceBreaker.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.productServiceBreaker.ignore-exceptions=\
com.ecommerce.orderservice.exceptions.InsufficientStockException,\
com.ecommerce.orderservice.exceptions.ProductNotFoundException
# ===============================

# ===============================
# Logging (Feign & SQL)
# ===============================
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
